"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, is compliant with the
date-time format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601
standard for representation of dates and times using the Gregorian calendar.
This scalar ignores leap seconds.
"""
scalar Date

"Signed integers that are significantly larger than the `Int` type."
scalar BigInt

"Information regarding a location for an asset."
type Location {
  "Descriptive text concerning the location."
  label: String
  "Name of the city of which the asset is associated."
  city: String
  "Name of the state or province of which the asset is associated."
  region: String
}

"Unique values for location labels, cities, and regions."
type LocationValues {
  "All known location lobels."
  labels: [String!]!
  "All known location cities."
  cities: [String!]!
  "All known location regions."
  regions: [String!]!
}

"""
Intrinsic metadata extracted from the asset file itself (EXIF for images,
ffprobe for videos). All fields are nullable because real-world files vary
widely in what they record.
"""
type AssetMetadata {
  "Camera manufacturer (EXIF Make)."
  cameraMake: String
  "Camera model (EXIF Model)."
  cameraModel: String
  "Lens manufacturer (EXIF LensMake)."
  lensMake: String
  "Lens model (EXIF LensModel)."
  lensModel: String
  "Exposure time, formatted like \"1/250\"."
  exposureTime: String
  "Aperture f-stop number (EXIF FNumber)."
  fNumber: Float
  "ISO speed rating."
  iso: Int
  "Focal length in 35mm equivalent millimeters."
  focalLength35mm: Float
  "Timezone offset for the original date-time, e.g. \"+09:00\"."
  originalDateOffset: String
  "GPS latitude in decimal degrees (negative for south)."
  gpsLatitude: Float
  "GPS longitude in decimal degrees (negative for west)."
  gpsLongitude: Float
  "Width in pixels in the displayed orientation."
  displayWidth: Int
  "Height in pixels in the displayed orientation."
  displayHeight: Int
  "Video duration in seconds."
  duration: Float
  "Video frame rate in frames per second."
  frameRate: Float
  "Video codec name (ffprobe codec_name)."
  videoCodec: String
  "Size in bytes of the stored asset blob."
  byteLength: BigInt
}

"""
Progress of synthetic-data extraction for an asset. Every asset has a status;
PENDING is the default until a worker (or backfill) records a terminal value.
"""
enum SyntheticStatus {
  "No worker has finished processing the asset yet."
  PENDING
  "Synthetic data has been extracted and stored."
  READY
  "All retry attempts failed; operator action required."
  FAILED
}

"""
A snapshot of the background synthetic-data extraction queue, for monitoring a
backfill as it drains. `facesQueued` reaching (and holding) zero means the faces
work is done. In-flight jobs are briefly absent from the queue while a worker
holds them, so a count can momentarily read a touch low; treat a sustained zero
as complete.
"""
type SyntheticJobStatus {
  "Jobs still waiting in the queue across both kinds (includes retry backoff)."
  queued: Int!
  "`faces` jobs still waiting in the queue."
  facesQueued: Int!
  "Assets whose faces extraction completed successfully."
  facesReady: Int!
  "Assets whose faces extraction failed after exhausting all retries."
  facesFailed: Int!
}

"""
Synthetic data derived from an image asset by machine-learning models. Phase 1
covers the label-tagging fields; the `people` collection arrives with Phase 2
and is resolved from a separate face store.
"""
type SyntheticData {
  "Curated display labels, ordered by descending classifier confidence."
  labels: [String!]!
  "Top label, denormalized for fast queries; null if no labels survived curation."
  primaryLabel: String
  "People (face clusters) appearing in this asset; empty when none were detected."
  people: [Person!]!
}

"""
A clustered identity derived from face recognition. The id is opaque; the name
is user-assigned and may be null. The thumbnail is the representative face crop.
"""
type Person {
  "Opaque person identifier."
  id: ID!
  "User-assigned display name, or null if unnamed."
  name: String
  "URL for the representative face crop (served by /faces/<face_id>/thumb)."
  thumbnail: String!
  "True when excluded from the People page."
  hidden: Boolean!
  "Number of faces clustered under this person."
  faceCount: Int!
}

"A single detected face, for the cluster-management view."
type Face {
  "Opaque face identifier (used with reassignFaces / setPersonThumbnail)."
  id: ID!
  "The asset this face was detected in."
  assetId: String!
  "URL for the aligned face crop (served by /faces/<id>/thumb)."
  thumbnail: String!
}

"""
An `Asset` defines a single entity in the storage system. This typically refers
to an image or video, but could be any type of file.
"""
type Asset {
  "The unique asset identifier."
  id: ID!
  "Hash digest of the contents of the asset."
  checksum: String!
  "The original filename of the asset when it was imported."
  filename: String!
  "Full path of the asset within the storage system."
  filepath: String!
  "The size in bytes of the asset."
  byteLength: BigInt!
  "The date-time that best represents the asset."
  datetime: Date!
  "The media type of the asset, such as 'image/jpeg' or 'video/mp4'."
  mediaType: String!
  "The list of tags associated with this asset."
  tags: [String!]!
  "A caption attributed to the asset."
  caption: String
  "Location information for the asset."
  location: Location
  "URL for retrieving the raw asset."
  assetUrl: String!
  "Intrinsic metadata extracted from the asset file."
  metadata: AssetMetadata
  "ML-derived synthetic data; null until extraction completes."
  synthetic: SyntheticData
  "Progress of synthetic-data extraction for this asset."
  syntheticStatus: SyntheticStatus!
}

"An attribute name and the number of assets it references."
type AttributeCount {
  "Label for an asset attribute, such as a tag or location."
  label: String!
  "Number of assets that are associated with this particular label."
  count: Int!
}

"`SearchResult` represents a single result from a query."
type SearchResult {
  "The identifier of the matching asset."
  assetId: String!
  "The date-time for the matching asset."
  datetime: Date!
  "The filename for the matching asset."
  filename: String!
  "The location for the matching asset, if available."
  location: Location
  "The media type of the asset, such as 'image/jpeg' or 'video/mp4'."
  mediaType: String!
  "URL for retrieving a thumbnail version of the asset."
  thumbnailUrl: String!
  """
  URL for retrieving an aspect-preserving preview of the asset.
  Pass exactly one of `width` or `height` to size the preview; if neither
  is given the preview defaults to 800px on the longer (height) axis.
  """
  previewUrl(width: Int, height: Int): String!
  "URL for retrieving the raw asset (mainly for videos)."
  assetUrl: String!
  "Intrinsic metadata extracted from the asset file."
  metadata: AssetMetadata
  "ML-derived synthetic data; null until extraction completes."
  synthetic: SyntheticData
  "Progress of synthetic-data extraction for this asset."
  syntheticStatus: SyntheticStatus!
}

"`SearchMeta` is returned from the search query."
type SearchMeta {
  "The list of results retrieved via the query."
  results: [SearchResult!]!
  "The total number of matching assets in the system, useful for pagination."
  count: Int!
  "Last possible page of available assets matching the query."
  lastPage: Int!
}

"Used in the browse feature in which a single asset is returned from a request."
type BrowseMeta {
  "An asset, if any are available."
  asset: Asset
  "Zero-based offset of this asset."
  offset: Int!
  "Offset of the last search result."
  lastOffset: Int!
}

"Field of the search results on which to sort."
enum SortField {
  DATE
  IDENTIFIER
  FILENAME
  MEDIATYPE
}

"""
Order by which to sort the search results. If not specified in the search
paramaters, the default is ascending.
"""
enum SortOrder {
  ASCENDING
  DESCENDING
}

"`PendingParams` defines the parameters by which to find pending assets."
input PendingParams {
  "Return pending assets that were imported after this date-time."
  after: Date
  "The field of the search results on which to sort the list."
  sortField: SortField
  "The order in which to arrange the search results."
  sortOrder: SortOrder
}

"`SearchParams` defines the various parameters by which to search for assets."
input SearchParams {
  "Tags that an asset should have. All should match."
  tags: [String!]
  "Locations of an asset. At least one must match."
  locations: [String!]
  """
  Date for filtering asset results. Only those assets whose canonical date
  occurs _after_ this date will be returned.
  """
  after: Date
  """
  Date for filtering asset results. Only those assets whose canonical date
  occurs _before_ this date will be returned.
  """
  before: Date
  "Find assets whose filename (e.g. img_3011.jpg) matches the one given."
  filename: String
  "Find assets whose media type (e.g. image/jpeg) matches the one given."
  mediaType: String
  "The field of the search results on which to sort the list."
  sortField: SortField
  "The order in which to arrange the search results."
  sortOrder: SortOrder
}

type Query {
  "Retrieve an asset by its unique identifier."
  asset(id: ID!): Asset
  "Look for an asset by the hash digest (SHA256)."
  lookup(checksum: String!): Asset
  "Return the total number of assets in the system."
  count: Int!
  "Search for pending assets after a given date-time."
  pending(params: PendingParams!, offset: Int, limit: Int): SearchMeta!
  "Search for assets by the given parameters."
  search(params: SearchParams!, offset: Int, limit: Int): SearchMeta!
  "Scan all assets and compare to the given query string."
  scan(
    query: String!
    sortField: SortField
    sortOrder: SortOrder
    offset: Int
    limit: Int
  ): SearchMeta!
  "Search and retrieve the details for the result at the given offset."
  searchFetchOffset(params: SearchParams!, offset: Int!): BrowseMeta!
  "Scan and retrieve the details for the result at the given offset."
  scanFetchOffset(
    query: String!
    sortField: SortField
    sortOrder: SortOrder
    offset: Int!
  ): BrowseMeta!
  "Search and retrieve the details for the result with the given identifier."
  searchFetchById(params: SearchParams!, id: ID!): BrowseMeta!
  "Scan and retrieve the details for the result with the given identifier."
  scanFetchById(
    query: String!
    sortField: SortField
    sortOrder: SortOrder
    id: ID!
  ): BrowseMeta!
  """
  Retrieve the union of tags for the given assets. The count for each tag
  indicates how many of the selected assets have that tag.
  """
  tagsForAssets(assets: [String!]!): [AttributeCount!]!
  "Retrieve the full location records with label, city, and region."
  locationRecords: [Location!]!
  """
  Retrieve location parts and their associated asset count. The parts include
  the location label, city, and region, each emitted separately.
  """
  locationParts: [AttributeCount!]!
  "Returns all unique location labels, cities, and regions."
  locationValues: LocationValues!
  "Retrieve the list of tags and their associated asset count."
  tags: [AttributeCount!]!
  "Retrieve the list of years and their associated asset count."
  years: [AttributeCount!]!
  "Retrieve the list of media types and their associated asset count."
  mediaTypes: [AttributeCount!]!
  """
  Retrieve every distinct `primaryLabel` with the number of assets carrying
  it and a thumbnail URL pulled from the most recently dated such asset.
  Backs the Labels page.
  """
  labels: [LabelEntry!]!
  """
  Search for assets whose `primaryLabel` matches the given label
  (case-insensitive). Results are paginated by `offset` / `limit`.
  """
  assetsByLabel(label: String!, offset: Int, limit: Int): SearchMeta!
  """
  Every person (face cluster) for the People page, each with a representative
  thumbnail and face count. Hidden people are omitted unless `includeHidden`.
  """
  people(includeHidden: Boolean = false): [Person!]!
  """
  Assets in which the given person appears, most-recently-detected first,
  paginated by `offset` / `limit`.
  """
  assetsByPerson(id: ID!, offset: Int, limit: Int): SearchMeta!
  "Every face clustered under a person, for the cluster-management view."
  personFaces(id: ID!): [Face!]!
  """
  Current state of the background synthetic-data extraction queue, for watching
  a backfill drain to completion.
  """
  syntheticJobStatus: SyntheticJobStatus!
}

"One row in the Labels page index."
type LabelEntry {
  "The curated display label."
  label: String!
  "How many assets currently carry this as their `primaryLabel`."
  count: Int!
  "URL for a thumbnail of the representative (most recent) asset."
  thumbnail: String!
}

"Information regarding a location for an asset."
input LocationInput {
  "Descriptive text concerning the location."
  label: String
  "Name of the city of which the asset is associated."
  city: String
  "Name of the state or province of which the asset is associated."
  region: String
}

"`AssetInput` is used to update the details of an asset."
input AssetInput {
  "New set of tags to replace the existing values."
  tags: [String!]
  """
  Any value here overwrites the caption in the asset. If the caption contains
  any #tags they will be merged with the tags in the asset and this input. If
  the caption contains an @location or @"location" then it will replace the
  asset location, if it has not been set.
  """
  caption: String
  """
  Values defined here overwrite the fields in the location of the asset. This
  field takes precedence over any @location value in the caption.
  """
  location: LocationInput
  """
  A date-time that overrides intrinsic values; a null value clears the custom
  property and reverts back to the intrinsic value.
  """
  datetime: Date
  "New media type, useful for fixing assets where detection guessed wrong."
  mediaType: String
  "Any value here overwrites the filename property."
  filename: String
}

"Specify the field of the location"
enum LocationField {
  LABEL
  CITY
  REGION
}

"Represents a change to a location field."
input LocationSet {
  "Field of location to be set or cleared."
  field: LocationField!
  "If value is null, will clear the location field."
  value: String
}

"A set of changes to make to an asset."
input AssetEdit {
  "Adds the given tags."
  addTags: [String!]
  "Removes matching tags."
  removeTags: [String!]
  "Sets or clears one or more location fields."
  setLocation: [LocationSet!]
  """
  Sets the custom date-time field to the given value. This field takes
  precedence over the addDays field, if both are given non-null values.
  """
  setDate: Date
  """
  Set the custom date-time field by adding days to the best date-time. If the
  value is negative, then that many days will be subtracted from the date-time.
  """
  addDays: Int!
}

type Mutation {
  """
  Import the files found in the `uploads` directory and return the number of
  files successfully imported into the system.
  """
  import: Int!
  "Update a single asset with the given tags, caption, custom date, etc."
  update(id: ID!, asset: AssetInput!): Asset!
  "Modify multiple assets based on their current properties."
  edit(assetIds: [String!]!, operations: AssetEdit!): Int!
  """
  Copy the tags, caption, and location from the old asset to the new one.
  Deletes the old asset from the database and the corresponding blob.
  """
  replace(oldAssetId: String!, newAssetId: String!): Asset!
  """
  One-shot backfill: read just enough of each video blob to parse its
  mp4/mov creation time and set `originalDate` on records that lack it.
  Returns the number of assets updated.
  """
  updateVideoDates: Int!
  """
  One-shot backfill: walk every image asset that lacks persisted metadata,
  fetch its EXIF tags from the blob store, and populate `AssetMetadata`.
  Returns the number of assets updated.
  """
  backfillImageMetadata: Int!
  """
  One-shot backfill: walk every video asset that lacks persisted metadata,
  fetch its ffprobe output from the blob store, and populate `AssetMetadata`.
  Returns the number of assets updated.
  """
  backfillVideoMetadata: Int!
  """
  One-shot fix: re-parse `originalDate` on image assets using the EXIF
  `OffsetTimeOriginal` tag (when present). Corrects records whose existing
  `originalDate` was stored as a UTC interpretation of local-clock EXIF
  fields. Returns the number of assets whose date changed.
  """
  fixOriginalDates: Int!
  """
  Backfill: enqueue a background `labels` extraction job for every image asset
  that lacks label data and is not already queued. Idempotent and resumable.
  Returns the number of assets enqueued.
  """
  backfillLabels: Int!
  """
  Re-enqueue extraction jobs for assets whose synthetic status is `FAILED`,
  resetting them to `PENDING`. Optionally restrict to one job kind (`labels` or
  `faces`). Returns the number of assets re-enqueued.
  """
  retrySyntheticJobs(kind: String): Int!
  """
  Backfill: enqueue a background `faces` extraction job for every image asset
  that lacks current face data (never processed, or produced by a stale model
  version) and is not already queued. Idempotent and resumable. Pass
  `force: true` to re-enqueue every image regardless of its current status —
  useful after switching detectors (e.g. to the Namazu push-down). Returns the
  number of assets enqueued.
  """
  backfillFaceRecognition(force: Boolean = false): Int!
  "Set or clear a person's user-assigned name."
  renamePerson(id: ID!, name: String): Person!
  "Merge the source person into the target; the source person is deleted."
  mergePeople(sourceId: ID!, targetId: ID!): Person!
  """
  Reassign the given faces to a person (splitting a cluster). A null `personId`
  creates a new person to receive them. Returns the destination person.
  """
  reassignFaces(faceIds: [ID!]!, personId: ID): Person!
  "Hide or unhide a person; hidden people are excluded from the People page."
  hidePerson(id: ID!, hidden: Boolean!): Person!
  """
  Hide every remaining unnamed person in one pass, clearing the long tail of
  auto-clustered strangers from the People page once the people worth naming
  have been named. Named and already-hidden people are untouched. Returns the
  number of people newly hidden.
  """
  hideUnnamedPeople: Int!
  "Pin a specific face (which must belong to the person) as its thumbnail."
  setPersonThumbnail(id: ID!, faceId: ID!): Person!
}

schema {
  query: Query
  mutation: Mutation
}
